<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  </style>
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>
  <rect width="1200" height="540" fill="#ffffff"/>
  <text x="600" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Pilotariak Ecosystem</text>
  <text x="600" y="54" text-anchor="middle" font-size="13" fill="#6b7280">Open Source Platform for the Basque Pelota Community</text>
  <rect x="20" y="68" width="1160" height="118" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="36" y="86" font-size="10" font-weight="700" fill="#9ca3af" letter-spacing="1.5">CLIENTS</text>
  <rect x="300" y="78" width="260" height="98" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="430" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Kancha</text>
  <text x="430" y="134" text-anchor="middle" font-size="12" fill="#4b5563">Mobile App · iOS &amp; Android</text>
  <text x="430" y="152" text-anchor="middle" font-size="11" fill="#16a34a">Expo · React Native</text>
  <text x="430" y="166" text-anchor="middle" font-size="10" fill="#86efac">Results · Calendar · Profiles</text>
  <rect x="640" y="78" width="260" height="98" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="770" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#7c3aed">Xilo</text>
  <text x="770" y="134" text-anchor="middle" font-size="12" fill="#4b5563">Slack Bot</text>
  <text x="770" y="152" text-anchor="middle" font-size="11" fill="#9333ea">Serverless · Edge · HMAC-SHA256</text>
  <text x="770" y="166" text-anchor="middle" font-size="10" fill="#c4b5fd">/xilo help · /xilo ping · /xilo hello</text>
  <!-- Arrows: Clients to Frontis -->
  <path d="M 430,176 C 430,205 500,205 500,228" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="430" y="193" width="74" height="17" rx="3" fill="white" opacity="0.9"/>
  <text x="467" y="205" text-anchor="middle" font-size="11" fill="#2563eb">GraphQL</text>
  <path d="M 770,176 C 770,205 700,205 700,228" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="696" y="193" width="74" height="17" rx="3" fill="white" opacity="0.9"/>
  <text x="733" y="205" text-anchor="middle" font-size="11" fill="#2563eb">GraphQL</text>
  <rect x="20" y="210" width="1160" height="124" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="36" y="228" font-size="10" font-weight="700" fill="#9ca3af" letter-spacing="1.5">GRAPHQL FEDERATION GATEWAY</text>
  <rect x="320" y="228" width="560" height="96" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="268" text-anchor="middle" font-size="20" font-weight="800" fill="#c2410c">Frontis</text>
  <text x="600" y="288" text-anchor="middle" font-size="13" fill="#4b5563">GraphQL Federation Gateway · Single /graphql endpoint</text>
  <text x="600" y="306" text-anchor="middle" font-size="11" fill="#92400e">Multi-league header routing · Query depth &amp; complexity limits · Schema composition</text>
  <rect x="320" y="228" width="80" height="20" rx="6" fill="#ea580c"/>
  <text x="360" y="242" text-anchor="middle" font-size="10" font-weight="700" fill="white">Federation</text>
  <!-- Arrows: Frontis to Subgraphs (orange) -->
  <path d="M 400,324 C 400,344 120,344 120,360" stroke="#ea580c" stroke-width="1.2" fill="none" marker-end="url(#arr-orange)"/>
  <path d="M 460,324 C 460,344 303,344 303,360" stroke="#ea580c" stroke-width="1.2" fill="none" marker-end="url(#arr-orange)"/>
  <path d="M 530,324 C 530,344 486,344 486,360" stroke="#ea580c" stroke-width="1.2" fill="none" marker-end="url(#arr-orange)"/>
  <path d="M 670,324 C 670,344 669,344 669,360" stroke="#ea580c" stroke-width="1.2" fill="none" marker-end="url(#arr-orange)"/>
  <path d="M 740,324 C 740,344 852,344 852,360" stroke="#ea580c" stroke-width="1.2" fill="none" marker-end="url(#arr-orange)"/>
  <path d="M 800,324 C 800,344 1035,344 1035,360" stroke="#ea580c" stroke-width="1.2" fill="none" marker-end="url(#arr-orange)"/>
  <rect x="20" y="344" width="1160" height="118" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="36" y="362" font-size="10" font-weight="700" fill="#9ca3af" letter-spacing="1.5">SUBGRAPHS</text>
  <rect x="40" y="357" width="155" height="82" rx="8" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="118" y="391" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">echo</text>
  <text x="118" y="407" text-anchor="middle" font-size="11" fill="#6b7280">Health &amp; version</text>
  <text x="118" y="423" text-anchor="middle" font-size="10" fill="#9ca3af">health check</text>
  <rect x="227" y="357" width="155" height="82" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="305" y="391" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">categories</text>
  <text x="305" y="407" text-anchor="middle" font-size="11" fill="#6b7280">Category entity</text>
  <text x="305" y="423" text-anchor="middle" font-size="10" fill="#93c5fd">@key: id</text>
  <rect x="414" y="357" width="155" height="82" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="492" y="391" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">clubs</text>
  <text x="492" y="407" text-anchor="middle" font-size="11" fill="#6b7280">Club entity</text>
  <text x="492" y="423" text-anchor="middle" font-size="10" fill="#f87171">@key: id</text>
  <rect x="601" y="357" width="155" height="82" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="679" y="388" text-anchor="middle" font-size="12" font-weight="700" fill="#a16207">competitions</text>
  <text x="679" y="406" text-anchor="middle" font-size="11" fill="#6b7280">Competition entity</text>
  <text x="679" y="422" text-anchor="middle" font-size="10" fill="#fbbf24">@key: id</text>
  <rect x="788" y="357" width="155" height="82" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="866" y="391" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">results</text>
  <text x="866" y="407" text-anchor="middle" font-size="11" fill="#6b7280">Result entity</text>
  <text x="866" y="423" text-anchor="middle" font-size="10" fill="#4ade80">@key: id</text>
  <rect x="975" y="357" width="155" height="82" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="1053" y="388" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">specialties</text>
  <text x="1053" y="406" text-anchor="middle" font-size="11" fill="#6b7280">Specialty entity</text>
  <text x="1053" y="422" text-anchor="middle" font-size="10" fill="#a78bfa">@key: id</text>
  <rect x="20" y="474" width="230" height="52" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="125" y="492" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Legend</text>
  <line x1="36" y1="508" x2="76" y2="508" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="84" y="512" font-size="11" fill="#6b7280">GraphQL query</text>
  <line x1="155" y1="508" x2="195" y2="508" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="203" y="512" font-size="11" fill="#6b7280">Federation routing</text>
  <rect x="950" y="474" width="230" height="52" rx="8" fill="#1e1b4b" stroke="#3730a3" stroke-width="1"/>
  <text x="1065" y="498" text-anchor="middle" font-size="14" font-weight="800" fill="white">Pilotariak</text>
  <text x="1065" y="516" text-anchor="middle" font-size="11" fill="#a5b4fc">Open Source · Apache 2.0</text>
</svg>